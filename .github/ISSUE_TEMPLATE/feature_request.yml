name: Feature request
description: Suggest a new capability or improvement
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an enhancement. Before you file, please
        skim the [Roadmap](README.md#roadmap) and the closed feature
        requests — your idea may already be tracked.

        This package is intentionally narrow (Gemma 4 text decoder only).
        Requests for unrelated model architectures, app-level utilities,
        or downstream UI features are likely to be closed with a pointer
        to a more appropriate package.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the use case in concrete terms. "I'm building X, and
        Gemma4SwiftCore gives me Y instead of Z." Avoid jumping straight
        to the implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API surface or behavior change would solve it?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: |
        Can the same outcome be achieved with the existing API? With a
        wrapper at the call site? With a sibling package?

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to send a PR?
      options:
        - "Yes — I'll write the implementation"
        - "Yes — I can help with tests and review"
        - "No — I'm just filing the request"
    validations:
      required: true
