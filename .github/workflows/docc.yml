name: DocC Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC archive
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select latest stable Xcode
        # mlx-swift-lm 2.31+ requires Swift 6.1 (Xcode 16+).
        run: |
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.2.app
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.0.app
          fi
          swift --version

      - name: Build documentation
        run: |
          swift package \
            --allow-writing-to-directory ./docs-build \
            generate-documentation \
            --target Gemma4SwiftCore \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path Swift-gemma4-core \
            --output-path ./docs-build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs-build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
