name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build-and-test:
    name: Swift build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        # mlx-swift-lm 2.31+ ships a Package.swift with
        # swift-tools-version: 6.1.0, which requires Swift 6.1 (Xcode 16+).
        # macos-15 runner ships Xcode 16.x by default; this `xcode-select`
        # call is belt-and-suspenders to make sure no future image change
        # silently downgrades us.
        run: |
          ls /Applications | grep -E "^Xcode_16" || true
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.2.app
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.0.app
          fi
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: swift build
        run: swift build -v

      - name: swift test (pure-Swift suites only)
        # Only ConfigurationTests and PromptFormattingTests are truly
        # pure-Swift. ProportionalRoPETests instantiates Gemma4ProportionalRoPE
        # which triggers MLX init via MLXArray construction; that fails on
        # `swift test` because the Metal library bundle isn't on the dyld
        # search path. SanitizeTests also imports MLX, and ModuleShapeTests
        # run real modules. Everything MLX-touching is exercised by the
        # xcodebuild-test job below, which DOES bundle the Metal library.
        run: |
          swift test -v --filter "ConfigurationTests|PromptFormattingTests"

  xcodebuild-test:
    name: xcodebuild test (full MLX suite)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.2.app
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -switch /Applications/Xcode_16.0.app
          fi
          xcodebuild -version

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme Gemma4SwiftCore

      - name: Run xcodebuild test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Gemma4SwiftCore \
            -destination 'platform=macOS,arch=arm64' \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-log
          path: xcodebuild.log

  forbidden-words:
    name: Forbidden-words scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for parent-project leakage
        run: bash scripts/verify_release.sh --check-words-only
