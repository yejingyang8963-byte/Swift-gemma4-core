# SwiftLint configuration for Gemma4SwiftCore
# https://github.com/realm/SwiftLint

# Paths to scan
included:
  - Sources
  - Tests

# Paths to ignore
excluded:
  - .build
  - .swiftpm
  - Tests/Gemma4SwiftCoreTests/Fixtures
  - Sources/Gemma4SwiftCore/Documentation.docc

# Rules opted in beyond the default set
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - first_where
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prohibited_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Rules disabled (and why)
disabled_rules:
  - line_length             # Enforced separately by file_length / our 200-line policy
  - identifier_name         # MLX uses k/v/q/x throughout — too noisy to enforce
  - type_name               # Same — Module subclasses use established names

# Per-rule configuration
file_length:
  warning: 200
  error: 250

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 200
  error: 250

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 5

reporter: "github-actions-logging"
